# ── v48 评分公式参数 ──
# 核心公式: det_contrib = min(|det|*2, DET_CAP)
#           x = det_contrib + quality*Q_WEIGHT
#           base_score = VMAX*x/(x+K_HALF) + CALIB_OFFSET
#           final = min(base_score + skin_bonus + tone_bonus + geo_bonus, 10.0)
# v48: 基于 SCUT-FBP5500 训练校准, 覆盖 [2, 9] 区间
scoring:
  vmax: 6.5          # Hill函数最大输出 (v48: 5.5→7.0, 基础分上界9→8.5)
  k_half: 16.3       # Hill半饱和点 (v48: 8→16.3, 数据驱动)
  q_weight: 5.0      # 品质权重 (v44: 22→5, det贡献占比提升)
  det_cap: 13.3      # |det|×2贡献上限 (v48: 随std自适应)
  calib_offset: 2.0  # 校准偏移 (v48: -0.2→2.0, 底线=2分)
  geo_weight: 0.5    # 几何维度全局权重 (v53.2: 1.5→0.5, v53.4: S=3增强区分度)

# ── v44 肤质加分 Sigmoid 参数 ──
# 公式: bonus = B_MAX / (1 + exp(-k * (s_clarity/10 - x0))) * pref_skin
# 输入 s_clarity∈[0,10], x0归一化到[0,1]
skin_clarity_bonus_cfg:
  b_max: 0.5         # 最大调节量 (v44: 0.4→0.5)
  k: 3.0             # sigmoid陡峭度 (v43: 8→3)
  x0: 0.50           # 拐点[0,1] (s_clarity/10=0.5 时 bonus=0.25)

# ── v53.5 几何加减分 对称Sigmoid (解剖学面宽比+双斜率衰减) ──
# 公式: bonus = GEO_WEIGHT * (2*sigmoid(k*ratio_score) - 1) * pref_weight
# ratio_score = MAX_BOOST - penalty_slope * deviation
#   face_ratio: 优先 MediaPipe 468关键点, 回退检测框 w/h
#   deviation: <0.72时=0.72-ratio, >0.75时=ratio-0.75, 平坦区内=0
# ratio_score>0→加分, ratio_score<0→扣分, 范围[-GEO_WEIGHT, +GEO_WEIGHT]
geo_bonus_cfg:
  b_max: 1.0         # (v53.2: 1.5→1.0, 对称Sigmoid不再使用独立乘数)
  k: 4.0             # sigmoid陡峭度 (v53.2: 6→4, 放缓过渡)
  x0: 0.0            # (v53.2: 对称Sigmoid, x0=0, 不再使用)
  penalty_slope: 3.0 # 衰减斜率 (v53.4: 1.0→3.0, SCUT验证: 增大区分度, 零交点≈0.62/0.85)

# ── 图片限制 ──
image_limits:
